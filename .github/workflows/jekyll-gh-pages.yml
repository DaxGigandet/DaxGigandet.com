# 🚀 Automate Jekyll Deployment to GitHub Pages with Custom Domain
name: Deploy Jekyll to GitHub Pages (daxgigandet.com)

on:
  push:
    branches: ["main"]  # Runs on pushes to 'main' branch
  workflow_dispatch:  # Allows manual runs

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Build Jekyll Site
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site

      - name: Add Custom Domain
        run: echo "daxgigandet.com" > ./_site/CNAME

      - name: Upload Built Site
        uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: "https://daxgigandet.com"
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
